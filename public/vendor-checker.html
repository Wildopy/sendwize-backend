<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Checker — Sendwize</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #EA7317;
      --orange-light: #FFF4EA;
      --bg: #FAFAFA;
      --white: #ffffff;
      --border: #f0f0f0;
      --border-mid: #e5e5e5;
      --text: #1a1a1a;
      --muted: #6b7280;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --green-bd: #bbf7d0;
      --yellow: #d97706;
      --yellow-bg: #fffbeb;
      --yellow-bd: #fde68a;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-bd: #fecaca;
      --blue: #1d4ed8;
      --blue-bg: #eff6ff;
      --blue-bd: #bfdbfe;
      --radius: 8px;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px 60px;
    }

    .container { max-width: 780px; margin: 0 auto; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      margin-bottom: 20px; transition: color .15s;
    }
    .back-link:hover { color: var(--orange); }

    .page-title    { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-subtitle { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 32px; }

    /* Card */
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
    }
    .card-label {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--orange); margin-bottom: 16px;
    }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-input {
      width: 100%; padding: 11px 40px 11px 14px;
      border: 1px solid var(--border-mid); border-radius: var(--radius);
      font-size: 14px; font-family: inherit; color: var(--text);
      background: var(--white); transition: border-color .15s;
    }
    .search-input:focus { outline: none; border-color: var(--orange); }
    .search-icon {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 16px; pointer-events: none;
    }

    /* Dropdown */
    .dropdown {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--white); border: 1px solid var(--border-mid);
      border-radius: var(--radius); z-index: 20;
      box-shadow: 0 4px 16px rgba(0,0,0,.08); max-height: 280px; overflow-y: auto;
    }
    .dropdown.show { display: block; }
    .dropdown-item {
      padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: var(--orange-light); }
    .dropdown-name { font-size: 13px; font-weight: 600; }
    .dropdown-cat  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .dropdown-custom { color: var(--orange); }

    /* Selected tags */
    .selected-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 10px; margin-bottom: 4px; }
    .vendor-tag {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--green-bg); border: 1px solid var(--green-bd);
      color: var(--green); padding: 6px 10px; border-radius: 6px;
      font-size: 13px; font-weight: 600;
    }
    .vendor-tag.custom {
      background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue);
    }
    .ai-pill {
      font-size: 10px; font-weight: 600; padding: 1px 6px;
      background: var(--blue-bg); color: var(--blue); border-radius: 3px;
    }
    .tag-remove {
      background: none; border: none; cursor: pointer; font-size: 15px;
      color: inherit; opacity: .6; padding: 0; line-height: 1; transition: opacity .15s;
    }
    .tag-remove:hover { opacity: 1; }

    .selected-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* Buttons */
    .btn-primary {
      width: 100%; padding: 13px 20px; background: var(--orange); color: var(--white);
      border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s; font-family: inherit; margin-top: 8px;
    }
    .btn-primary:hover:not(:disabled) { background: #d4660f; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

    .btn-secondary {
      padding: 8px 16px; border: 1px solid var(--border-mid);
      border-radius: var(--radius); font-size: 13px; font-weight: 500;
      background: var(--white); color: var(--text); cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }

    .btn-link {
      padding: 7px 14px; border: 1px solid var(--border-mid);
      border-radius: var(--radius); font-size: 12px; font-weight: 500;
      background: var(--white); color: var(--muted); cursor: pointer;
      font-family: inherit; transition: all .15s; text-decoration: none;
      display: inline-block;
    }
    .btn-link:hover { border-color: var(--orange); color: var(--orange); }

    /* Error */
    .error-box {
      display: none; background: var(--red-bg); border: 1px solid var(--red-bd);
      border-radius: var(--radius); padding: 14px; margin-bottom: 18px;
      font-size: 13px; color: var(--red);
    }
    .error-box.show { display: block; }

    /* Loading */
    .loading { display: none; text-align: center; padding: 56px 20px; }
    .loading.show { display: block; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--muted); }

    /* Results */
    .results { display: none; }
    .results.show { display: block; }

    .new-check-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border: 1px solid var(--border-mid);
      border-radius: var(--radius); font-size: 13px; font-weight: 500;
      background: var(--white); color: var(--text); cursor: pointer;
      font-family: inherit; transition: all .15s; margin-bottom: 24px;
    }
    .new-check-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* Summary bar */
    .summary-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; background: var(--white);
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 20px; gap: 20px; flex-wrap: wrap;
    }
    .summary-score { font-size: 32px; font-weight: 800; color: var(--orange); }
    .summary-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .summary-stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-num { font-size: 20px; font-weight: 700; }
    .stat-lbl { font-size: 11px; color: var(--muted); }
    .stat.good  .stat-num { color: var(--green); }
    .stat.warn  .stat-num { color: var(--yellow); }
    .stat.bad   .stat-num { color: var(--red); }

    /* Vendor cards */
    .vendor-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .vendor-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; cursor: pointer; transition: background .1s; gap: 12px;
    }
    .vendor-header:hover { background: var(--bg); }
    .vendor-left  { flex: 1; }
    .vendor-name  { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .vendor-meta  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .vendor-cat   { font-size: 12px; color: var(--muted); }

    .score-badge {
      display: inline-block; padding: 3px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 700;
    }
    .score-high   { background: var(--green-bg); color: var(--green); }
    .score-medium { background: var(--yellow-bg); color: var(--yellow); }
    .score-low    { background: var(--red-bg);    color: var(--red); }

    .ai-badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px;
      background: var(--blue-bg); color: var(--blue); border-radius: 3px;
    }

    .chevron {
      color: var(--muted); font-size: 18px; transition: transform .25s; flex-shrink: 0;
    }
    .vendor-card.open .chevron { transform: rotate(180deg); }

    /* Vendor body */
    .vendor-body {
      max-height: 0; overflow: hidden; transition: max-height .3s ease;
      border-top: 1px solid var(--border);
    }
    .vendor-card.open .vendor-body { max-height: 1200px; }
    .vendor-body-inner { padding: 20px; }

    /* AI warning */
    .ai-warn {
      background: var(--yellow-bg); border-left: 3px solid var(--yellow);
      padding: 12px 14px; border-radius: 4px; margin-bottom: 16px;
      font-size: 13px; color: #78350f; line-height: 1.5;
    }

    /* Detail items */
    .detail-list { display: flex; flex-direction: column; gap: 0; }
    .detail-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .detail-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .detail-desc  { font-size: 13px; color: var(--muted); line-height: 1.5; }

    /* Action items */
    .action-box {
      background: var(--orange-light); border-radius: var(--radius);
      padding: 14px 16px; margin-top: 14px;
    }
    .action-title { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
    .action-list  { padding-left: 16px; }
    .action-list li { font-size: 13px; color: var(--text); margin-bottom: 6px; line-height: 1.5; }

    /* Links row */
    .links-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

    @media(max-width:500px){ .summary-stats { gap: 12px; } }
  </style>
</head>
<body>
<div class="container">

  <a href="javascript:history.back()" class="back-link">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 12L6 8l4-4"/></svg>
    Dashboard
  </a>

  <h1 class="page-title">Vendor Checker</h1>
  <p class="page-subtitle">Check your marketing tools for UK GDPR compliance — DPAs, data location, certifications and breach history. Custom vendors are analysed by Claude AI.</p>

  <div class="error-box" id="errorBox"></div>

  <!-- Form -->
  <div id="formSection">
    <div class="card">
      <div class="card-label">Search Vendors</div>

      <div class="search-wrap" id="searchWrap">
        <input type="text" class="search-input" id="searchInput"
               placeholder="Type vendor name e.g. Mailchimp, HubSpot…"
               autocomplete="off"
               oninput="onSearch(this.value)" />
        <span class="search-icon">🔍</span>
        <div class="dropdown" id="dropdown"></div>
      </div>

      <div class="selected-list" id="selectedList"></div>
      <div class="selected-hint" id="selectedHint" style="display:none;"></div>
    </div>

    <button class="btn-primary" id="submitBtn" disabled onclick="runCheck()">
      Check Vendors
    </button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingSection">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Checking vendors…</div>
  </div>

  <!-- Results -->
  <div class="results" id="resultsSection">
    <button class="new-check-btn" onclick="resetForm()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8a6 6 0 1 0 6-6"/><path d="M2 4v4h4"/></svg>
      New Check
    </button>

    <!-- Summary -->
    <div class="summary-bar" id="summaryBar"></div>

    <!-- Vendor cards -->
    <div id="vendorCards"></div>
  </div>

</div>

<script>
  const userId     = new URLSearchParams(window.location.search).get('userId') || '';
  const VERCEL_URL = window.location.origin;

  let allVendors      = [];
  let selectedVendors = [];   // { name, category, isCustom, ...airtable fields }

  // ─── Load vendors from Airtable via data.js ───────────────────────
  async function loadVendors() {
    try {
      const resp = await fetch(`${VERCEL_URL}/api/data?action=vendors`);
      if (!resp.ok) throw new Error();
      const data = await resp.json();
      allVendors = data.vendors || [];
    } catch {
      // Fallback so search still works with common names
      allVendors = [
        { name: 'Mailchimp',        category: 'Email Service Provider' },
        { name: 'HubSpot',          category: 'CRM' },
        { name: 'Klaviyo',          category: 'Email Service Provider' },
        { name: 'ActiveCampaign',   category: 'Email Service Provider' },
        { name: 'Salesforce',       category: 'CRM' },
        { name: 'SendGrid',         category: 'Email Service Provider' },
        { name: 'Brevo',            category: 'Email Service Provider' },
        { name: 'Google Analytics', category: 'Analytics' },
        { name: 'Hotjar',           category: 'Analytics' },
        { name: 'Typeform',         category: 'Forms' },
        { name: 'Pipedrive',        category: 'CRM' },
        { name: 'Zoho CRM',         category: 'CRM' },
      ];
    }
  }

  // ─── Search ────────────────────────────────────────────────────────
  function onSearch(val) {
    const q  = val.trim().toLowerCase();
    const dd = document.getElementById('dropdown');

    if (q.length < 2) { dd.classList.remove('show'); return; }

    const matches = allVendors.filter(v =>
      v.name.toLowerCase().includes(q) &&
      !selectedVendors.find(s => s.name === v.name)
    );

    let html = matches.slice(0, 10).map(v => `
      <div class="dropdown-item" onclick="selectVendor(${JSON.stringify(v.name)})">
        <div class="dropdown-name">${escHtml(v.name)}</div>
        <div class="dropdown-cat">${escHtml(v.category || '')}</div>
      </div>`).join('');

    // Always offer custom entry if typed name not exact match
    const exactMatch = allVendors.find(v => v.name.toLowerCase() === q);
    if (!exactMatch) {
      const display = val.trim().charAt(0).toUpperCase() + val.trim().slice(1);
      html += `<div class="dropdown-item" onclick="addCustom(${JSON.stringify(display)})">
        <div class="dropdown-name dropdown-custom">➕ Add "${escHtml(display)}" as custom vendor</div>
        <div class="dropdown-cat">Claude AI will analyse this vendor</div>
      </div>`;
    }

    dd.innerHTML = html || `<div class="dropdown-item"><div class="dropdown-name" style="color:var(--muted)">No vendors found</div></div>`;
    dd.classList.add('show');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#searchWrap')) document.getElementById('dropdown').classList.remove('show');
  });

  function selectVendor(name) {
    const vendor = allVendors.find(v => v.name === name);
    if (!vendor || selectedVendors.find(s => s.name === name)) return;
    selectedVendors.push({ ...vendor, isCustom: false });
    afterSelect();
  }

  function addCustom(name) {
    if (!name || selectedVendors.find(s => s.name.toLowerCase() === name.toLowerCase())) return;
    selectedVendors.push({ name, category: 'Custom Vendor', isCustom: true });
    afterSelect();
  }

  function afterSelect() {
    document.getElementById('searchInput').value = '';
    document.getElementById('dropdown').classList.remove('show');
    renderTags();
  }

  function removeVendor(name) {
    selectedVendors = selectedVendors.filter(v => v.name !== name);
    renderTags();
  }

  function renderTags() {
    const list = document.getElementById('selectedList');
    const hint = document.getElementById('selectedHint');
    const btn  = document.getElementById('submitBtn');

    if (!selectedVendors.length) {
      list.innerHTML = '';
      hint.style.display = 'none';
      btn.disabled = true;
      return;
    }

    list.innerHTML = selectedVendors.map(v => `
      <span class="vendor-tag ${v.isCustom ? 'custom' : ''}">
        ${escHtml(v.name)}
        ${v.isCustom ? '<span class="ai-pill">AI</span>' : ''}
        <button class="tag-remove" onclick="removeVendor(${JSON.stringify(v.name)})">×</button>
      </span>`).join('');

    hint.style.display = 'block';
    hint.textContent   = `${selectedVendors.length} vendor${selectedVendors.length !== 1 ? 's' : ''} selected${selectedVendors.some(v => v.isCustom) ? ' — custom vendors will be analysed by Claude AI' : ''}`;
    btn.disabled = false;
  }

  // ─── Run check ────────────────────────────────────────────────────
  async function runCheck() {
    clearError();
    if (!selectedVendors.length) return;
    if (!userId) { showError('Missing userId. Please access this tool via your Sendwize dashboard.'); return; }

    const customCount = selectedVendors.filter(v => v.isCustom).length;
    document.getElementById('loadingText').textContent =
      customCount > 0 ? `Checking vendors — Claude AI is analysing ${customCount} custom vendor${customCount !== 1 ? 's' : ''}…` : 'Checking vendors…';

    document.getElementById('formSection').style.display = 'none';
    document.getElementById('loadingSection').classList.add('show');

    try {
      const resp = await fetch(`${VERCEL_URL}/api/check-vendors`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ vendors: selectedVendors, userId })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || `Server error ${resp.status}`);
      }

      const data = await resp.json();
      renderResults(data.results);

    } catch (err) {
      showError('Check failed: ' + err.message);
      document.getElementById('formSection').style.display = 'block';
      document.getElementById('loadingSection').classList.remove('show');
    }
  }

  // ─── Render results ───────────────────────────────────────────────
  function renderResults(results) {
    if (!results?.length) { showError('No results returned.'); return; }

    const avg      = Math.round(results.reduce((s, r) => s + (r.score || 0), 0) / results.length);
    const highCount= results.filter(r => (r.score || 0) >= 80).length;
    const midCount = results.filter(r => (r.score || 0) >= 60 && (r.score || 0) < 80).length;
    const lowCount = results.filter(r => (r.score || 0) < 60).length;

    document.getElementById('summaryBar').innerHTML = `
      <div>
        <div class="summary-score">${avg}<span style="font-size:18px;color:var(--muted)">/100</span></div>
        <div class="summary-label">Average compliance score</div>
      </div>
      <div class="summary-stats">
        <div class="stat good"><div class="stat-num">${highCount}</div><div class="stat-lbl">Compliant</div></div>
        <div class="stat warn"><div class="stat-num">${midCount}</div><div class="stat-lbl">Review</div></div>
        <div class="stat bad" ><div class="stat-num">${lowCount}</div><div class="stat-lbl">At Risk</div></div>
      </div>`;

    document.getElementById('vendorCards').innerHTML = results
      .sort((a, b) => (a.score || 0) - (b.score || 0))   // worst first
      .map((v, i) => renderVendorCard(v, i)).join('');

    document.getElementById('loadingSection').classList.remove('show');
    document.getElementById('resultsSection').classList.add('show');
  }

  function renderVendorCard(v, i) {
    const score     = v.score || 0;
    const scoreCls  = score >= 80 ? 'score-high' : score >= 60 ? 'score-medium' : 'score-low';
    const scoreLabel= score >= 80 ? 'Compliant'  : score >= 60 ? 'Review'       : 'At Risk';

    const detailsHtml = (v.details || []).map(d => {
      const icon = d.status === 'pass' ? '✅' : d.status === 'warning' ? '⚠️' : 'ℹ️';
      return `<div class="detail-item">
        <div class="detail-icon">${icon}</div>
        <div>
          <div class="detail-label">${escHtml(d.label || '')}</div>
          <div class="detail-desc">${escHtml(d.description || '')}</div>
        </div>
      </div>`;
    }).join('');

    const actionsHtml = v.actionItems?.length ? `
      <div class="action-box">
        <div class="action-title">Action Items</div>
        <ol class="action-list">
          ${v.actionItems.map(a => `<li>${escHtml(a)}</li>`).join('')}
        </ol>
      </div>` : '';

    const linksHtml = (v.links?.dpa || v.links?.privacy) ? `
      <div class="links-row">
        ${v.links.dpa     ? `<a class="btn-link" href="${escHtml(v.links.dpa)}"     target="_blank" rel="noopener">View DPA ↗</a>`     : ''}
        ${v.links.privacy ? `<a class="btn-link" href="${escHtml(v.links.privacy)}" target="_blank" rel="noopener">Privacy Policy ↗</a>` : ''}
      </div>` : '';

    const aiWarnHtml = v.isAI ? `
      <div class="ai-warn">
        <strong>⚠️ AI Analysis</strong> — this vendor isn't in our verified database. Claude analysed their public information. Verify directly with the vendor before relying on this assessment.
      </div>` : '';

    return `<div class="vendor-card" id="vc_${i}">
      <div class="vendor-header" onclick="toggleCard('vc_${i}')">
        <div class="vendor-left">
          <div class="vendor-name">
            ${escHtml(v.name)}
            ${v.isAI ? '<span class="ai-badge">AI Analysis</span>' : ''}
          </div>
          <div class="vendor-meta">
            <span class="score-badge ${scoreCls}">${score}/100 — ${scoreLabel}</span>
            <span class="vendor-cat">${escHtml(v.category || '')}</span>
          </div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="vendor-body">
        <div class="vendor-body-inner">
          ${aiWarnHtml}
          <div class="detail-list">${detailsHtml || '<div style="font-size:13px;color:var(--muted)">No details available.</div>'}</div>
          ${actionsHtml}
          ${linksHtml}
        </div>
      </div>
    </div>`;
  }

  function toggleCard(id) {
    document.getElementById(id).classList.toggle('open');
  }

  // ─── Reset ────────────────────────────────────────────────────────
  function resetForm() {
    selectedVendors = [];
    renderTags();
    document.getElementById('resultsSection').classList.remove('show');
    document.getElementById('formSection').style.display = 'block';
    clearError();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── Helpers ──────────────────────────────────────────────────────
  function showError(msg) { const e = document.getElementById('errorBox'); e.textContent = msg; e.classList.add('show'); }
  function clearError()   { document.getElementById('errorBox').classList.remove('show'); }
  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Init ─────────────────────────────────────────────────────────
