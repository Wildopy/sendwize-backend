<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Compliance Scanner - Sendwize</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAFA;
      line-height: 1.6;
      color: #000;
    }
    
    .header {
      background: white;
      padding: 20px 40px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #EA7317;
      text-transform: lowercase;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .scanner-section {
      background: white;
      padding: 40px;
      border-radius: 8px;
      border: 1px solid #f0f0f0;
      margin-bottom: 30px;
    }
    
    .section-title {
      font-size: 28px;
      font-weight: 700;
      color: #000;
      margin-bottom: 10px;
    }
    
    .section-description {
      color: #666;
      margin-bottom: 30px;
    }
    
    .textarea-input {
      width: 100%;
      min-height: 200px;
      padding: 16px;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 20px;
    }
    
    .button-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .btn-primary {
      background: #EA7317;
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary:hover {
      background: #d66614;
    }
    
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: white;
      color: #EA7317;
      padding: 14px 28px;
      border: 2px solid #EA7317;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-secondary:hover {
      background: #EA7317;
      color: white;
    }
    
    .results-section {
      background: white;
      padding: 40px;
      border-radius: 8px;
      border: 1px solid #f0f0f0;
      margin-bottom: 30px;
    }
    
    .score-display {
      text-align: center;
      padding: 30px;
      margin-bottom: 30px;
    }
    
    .score-number {
      font-size: 72px;
      font-weight: 700;
      margin: 20px 0;
    }
    
    .score-high { color: #065F46; }
    .score-medium { color: #EA7317; }
    .score-low { color: #991B1B; }
    
    .score-verdict {
      font-size: 20px;
      font-weight: 600;
      color: #666;
    }
    
    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin: 30px 0;
    }
    
    .comparison-panel {
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .panel-header {
      padding: 15px 20px;
      font-weight: 700;
      font-size: 16px;
    }
    
    .panel-original {
      background: #FEE2E2;
      color: #991B1B;
    }
    
    .panel-fixed {
      background: #D1FAE5;
      color: #065F46;
    }
    
    .panel-content {
      padding: 20px;
      background: white;
      white-space: pre-wrap;
      line-height: 1.8;
      min-height: 150px;
    }
    
    .violations-list {
      margin: 30px 0;
    }
    
    .violation-item {
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid;
    }
    
    .violation-high {
      background: #FEF2F2;
      border-color: #EF4444;
    }
    
    .violation-medium {
      background: #FFFBEB;
      border-color: #F59E0B;
    }
    
    .violation-low {
      background: #EFF6FF;
      border-color: #3B82F6;
    }
    
    .violation-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 10px;
    }
    
    .violation-title {
      font-weight: 700;
      font-size: 16px;
      color: #000;
    }
    
    .violation-badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .badge-high { background: #FEE2E2; color: #991B1B; }
    .badge-medium { background: #FEF3C7; color: #92400E; }
    .badge-low { background: #DBEAFE; color: #1E40AF; }
    
    .violation-text {
      color: #666;
      margin: 8px 0;
      line-height: 1.6;
    }
    
    .related-cases {
      background: #FFF7ED;
      border: 1px solid #FDBA74;
      border-radius: 8px;
      padding: 25px;
      margin: 30px 0;
    }
    
    .related-cases-title {
      font-weight: 700;
      font-size: 18px;
      color: #000;
      margin-bottom: 15px;
    }
    
    .case-item {
      padding: 15px;
      background: white;
      border-radius: 6px;
      margin-bottom: 12px;
      border-left: 3px solid #EA7317;
    }
    
    .case-company {
      font-weight: 700;
      color: #000;
      margin-bottom: 5px;
    }
    
    .case-fine {
      font-size: 20px;
      font-weight: 700;
      color: #EF4444;
      margin: 8px 0;
    }
    
    .case-description {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    @media (max-width: 768px) {
      .comparison-grid {
        grid-template-columns: 1fr;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      .btn-primary, .btn-secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">sendwize</div>
  </div>
  
  <div class="container">
    <div class="scanner-section">
      <h1 class="section-title">AI Compliance Scanner</h1>
      <p class="section-description">
        Paste your marketing content below. Our AI will scan for PECR, GDPR, ASA CAP Code, and CMA violations,
        show you real fines from similar cases, and automatically fix any issues.
      </p>
      
      <textarea 
        class="textarea-input" 
        id="contentInput"
        placeholder="Paste your email copy, ad text, social media post, or any marketing content here...

Example:
Subject: FREE GIFT - Limited Time Only!

Dear Customer,

This is your LAST CHANCE to claim your FREE gift! Only 2 items left in stock!

We're the UK's #1 provider with the BEST prices guaranteed.

Click here now before it's too late!"
      ></textarea>
      
      <div class="button-group">
        <button class="btn-primary" id="scanBtn">🔍 Scan for Violations</button>
        <button class="btn-secondary" id="scanFixBtn">✨ Scan & Auto-Fix</button>
      </div>
    </div>
    
    <div id="resultsContainer" style="display: none;">
      <!-- Results populated by JavaScript -->
    </div>
  </div>

  <script src="https://api.memberstackapp.com/static/memberstack.js?custom" data-memberstack-id="app_cmk1jc5fs00ry0ssb70vgbz3r"></script>
  
  <script>
    const VERCEL_URL = 'https://sendwize-backend.vercel.app';
    
    document.getElementById('scanBtn').addEventListener('click', () => runScan(false));
    document.getElementById('scanFixBtn').addEventListener('click', () => runScan(true));
    
    async function runScan(autoFix) {
      const content = document.getElementById('contentInput').value.trim();
      
      if (!content) {
        alert('Please paste some marketing content to scan');
        return;
      }
      
      const scanBtn = document.getElementById('scanBtn');
      const scanFixBtn = document.getElementById('scanFixBtn');
      const resultsContainer = document.getElementById('resultsContainer');
      
      scanBtn.disabled = true;
      scanFixBtn.disabled = true;
      scanBtn.textContent = autoFix ? '🔍 Scan for Violations' : '⏳ Scanning...';
      scanFixBtn.textContent = autoFix ? '⏳ Scanning & Fixing...' : '✨ Scan & Auto-Fix';
      
      resultsContainer.style.display = 'block';
      resultsContainer.innerHTML = '<div class="loading">Analyzing your content with AI...</div>';
      
      try {
        if (!window.$memberstackDom) {
          throw new Error('Please log in first');
        }
        
        const result = await window.$memberstackDom.getCurrentMember();
        const member = result.data;
        
        if (!member || !member.id) {
          throw new Error('Please log in to use this tool');
        }
        
        const response = await fetch(`${VERCEL_URL}/api/analyze-copy`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: content,
            userId: member.id,
            autoFix: autoFix
          })
        });
        
        if (!response.ok) {
          throw new Error('Scan failed');
        }
        
        const data = await response.json();
        displayResults(data, autoFix);
        
      } catch (error) {
        console.error('Error:', error);
        resultsContainer.innerHTML = '<div class="loading">❌ Error: ' + error.message + '</div>';
      } finally {
        scanBtn.disabled = false;
        scanFixBtn.disabled = false;
        scanBtn.textContent = '🔍 Scan for Violations';
        scanFixBtn.textContent = '✨ Scan & Auto-Fix';
      }
    }
    
    function displayResults(data, showFix) {
      const { score, verdict, violations, fixedVersion, relatedCases, summary } = data;
      
      const scoreClass = score >= 70 ? 'score-high' : score >= 40 ? 'score-medium' : 'score-low';
      
      let html = `
        <div class="results-section">
          <div class="score-display">
            <div class="score-number ${scoreClass}">${score}<span style="font-size: 40px; color: #999;">/100</span></div>
            <div class="score-verdict">${verdict}</div>
          </div>
      `;
      
      // Show comparison if auto-fix was used
      if (showFix && fixedVersion) {
        const originalContent = document.getElementById('contentInput').value;
        html += `
          <h3 style="font-size: 22px; font-weight: 700; margin-bottom: 20px;">📝 Original vs Compliant Version</h3>
          <div class="comparison-grid">
            <div class="comparison-panel">
              <div class="panel-header panel-original">❌ Original (Non-Compliant)</div>
              <div class="panel-content">${escapeHtml(originalContent)}</div>
            </div>
            <div class="comparison-panel">
              <div class="panel-header panel-fixed">✅ Fixed (Compliant)</div>
              <div class="panel-content">${escapeHtml(fixedVersion)}</div>
            </div>
          </div>
          <button class="btn-primary" onclick="copyFixed()" style="margin-bottom: 30px;">📋 Copy Fixed Version</button>
        `;
      }
      
      // Show violations
      if (violations && violations.length > 0) {
        html += `
          <h3 style="font-size: 22px; font-weight: 700; margin: 30px 0 20px;">🚨 Violations Found (${violations.length})</h3>
          <div class="violations-list">
        `;
        
        violations.forEach(v => {
          const severityClass = v.severity === 'high' ? 'violation-high' : 
                               v.severity === 'medium' ? 'violation-medium' : 'violation-low';
          const badgeClass = v.severity === 'high' ? 'badge-high' : 
                            v.severity === 'medium' ? 'badge-medium' : 'badge-low';
          
          html += `
            <div class="violation-item ${severityClass}">
              <div class="violation-header">
                <div class="violation-title">${escapeHtml(v.regulation)}</div>
                <span class="violation-badge ${badgeClass}">${v.severity}</span>
              </div>
              <div class="violation-text"><strong>Issue:</strong> ${escapeHtml(v.issue)}</div>
              <div class="violation-text"><strong>Location:</strong> ${escapeHtml(v.location)}</div>
              <div class="violation-text"><strong>Fix:</strong> ${escapeHtml(v.recommendation)}</div>
            </div>
          `;
        });
        
        html += '</div>';
      }
      
      // Show related cases from violation database
      if (relatedCases && relatedCases.length > 0) {
        const totalFines = relatedCases.reduce((sum, c) => sum + (c.fine || 0), 0);
        const finesCount = relatedCases.filter(c => c.fine > 0).length;
        const avgFine = finesCount > 0 ? totalFines / finesCount : 0;
        
        html += `
          <div class="related-cases">
            <div class="related-cases-title">⚖️ Real Cases: Similar Violations</div>
            <p style="color: #92400E; margin-bottom: 20px;">
              <strong>${relatedCases.length} companies</strong> were penalized for similar violations.
              ${totalFines > 0 ? `Total fines: <strong>£${totalFines.toLocaleString()}</strong>` : ''}
              ${avgFine > 0 ? ` (Average: £${Math.round(avgFine).toLocaleString()})` : ''}
            </p>
        `;
        
        relatedCases.slice(0, 3).forEach(c => {
          html += `
            <div class="case-item">
              <div class="case-company">${escapeHtml(c.company)} - ${escapeHtml(c.regulator)}</div>
              ${c.fine > 0 ? `<div class="case-fine">£${c.fine.toLocaleString()} fine</div>` : '<div class="case-fine">ASA Ruling Upheld</div>'}
              <div class="case-description">${escapeHtml(c.violation)}</div>
            </div>
          `;
        });
        
        html += `</div>`;
      }
      
      html += '</div>';
      
      document.getElementById('resultsContainer').innerHTML = html;
      
      // Store fixed version for copy function
      window.fixedContent = fixedVersion;
    }
    
    function copyFixed() {
      if (window.fixedContent) {
        navigator.clipboard.writeText(window.fixedContent).then(() => {
          alert('✅ Compliant version copied to clipboard!');
        });
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
  </script>

</body>
</html>
